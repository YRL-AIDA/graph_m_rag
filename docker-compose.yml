services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: rag-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - rag-network

  mineru:
    build:
      context: ./mineru
      dockerfile: Dockerfile
    container_name: rag-mineru
    ports:
      - "8001:8000"
    environment:
      - MODELSCOPE_CACHE=/app/models
      - PYTHONUNBUFFERED=1
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET}
    volumes:
      - mineru_models:/app/models
      - ./data:/app/data
    networks:
      - rag-network
    depends_on:
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              count: all # Request all available GPUs
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - rag-network
    environment:
      - API_KEY=${QDRANT_API_KEY}

networks:
  rag-network:
    driver: bridge

volumes:
  minio_data:
  mineru_models:
  qdrant_data: